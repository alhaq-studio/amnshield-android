name: Android Build & Test CI

on:
  push:
    branches: [ main, Test/Beta, Rebranding/Beta ]
  pull_request:
    branches: [ main, Test/Beta, Rebranding/Beta ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Unit Tests
        run: ./gradlew testPlaystoreDebugUnitTest

      - name: Build Playstore Debug APK
        run: ./gradlew assemblePlaystoreDebug

      - name: Build F-Droid Debug APK
        run: ./gradlew assembleFdroidDebug

      - name: Build Universal Debug APK
        run: ./gradlew assembleUniversalDebug

      - name: Upload Playstore APK
        uses: actions/upload-artifact@v4
        with:
          name: AmnShield-Playstore-APK
          path: app/build/outputs/apk/playstore/debug/app-playstore-debug.apk

      - name: Upload F-Droid APK
        uses: actions/upload-artifact@v4
        with:
          name: AmnShield-Fdroid-APK
          path: app/build/outputs/apk/fdroid/debug/app-fdroid-debug.apk

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: AmnShield-Universal-APK
          path: app/build/outputs/apk/universal/debug/app-universal-debug.apk
