name: Android Build & Test CI

on:
  push:
    branches: [ main, Test/Pre-Production ]
  pull_request:
    branches: [ main, Test/Pre-Production ]

jobs:
  # ── Job 1: Unit Tests ──────────────────────────────────────────────────────
  # Always runs on branch pushes and PRs. All other jobs depend on this passing.
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Unit Tests
        run: ./gradlew testPlaystoreDebugUnitTest testFdroidDebugUnitTest testUniversalDebugUnitTest

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/

  # ── Job 2: Debug Builds (CI sanity check) ─────────────────────────────────
  # Confirms all three flavors compile cleanly. Only runs after tests pass.
  build-debug:
    name: Build Debug APKs
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build All Debug Flavors
        run: ./gradlew assemblePlaystoreDebug assembleFdroidDebug assembleUniversalDebug

      - name: Upload Playstore Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AmnShield-Playstore-Debug
          path: app/build/outputs/apk/playstore/debug/app-playstore-debug.apk

      - name: Upload F-Droid Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AmnShield-Fdroid-Debug
          path: app/build/outputs/apk/fdroid/debug/app-fdroid-debug.apk

      - name: Upload Universal Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AmnShield-Universal-Debug
          path: app/build/outputs/apk/universal/debug/app-universal-debug.apk
